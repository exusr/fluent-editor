name: fluent_editor
description: "A powerful and feature-rich rich word processor for Flutter applications with support for rich text editing, tables, images, lists, and export to DOCX, ODT, and PDF formats."
version: 1.0.6
homepage: https://github.com/exusr/fluent-editor

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.11.0
  desktop_drop: ^0.7.1
  file_picker: ^8.0.0
  file_selector: ^1.0.0
  pdf: ^3.11.0
  path_provider: ^2.1.0
  google_fonts: ^6.2.1
  archive: ^3.6.1
  html: ^0.15.4
  xml: ^6.5.0
  nanoid: ^1.0.0
  json_serializable: ^6.7.1
  shared_preferences: ^2.3.0
  vector_math: ^2.1.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8

flutter:
  assets:
    - assets/fonts/
    - assets/google_fonts/

  # Local Google Fonts bundled for offline use on web
  # These fonts are loaded via TextStyle(fontFamily: ...) without network requests
  fonts:
    - family: DejaVu Sans
      fonts:
        - asset: assets/fonts/DejaVuSans.ttf
        - asset: assets/fonts/DejaVuSans-Oblique.ttf
          style: italic
        - asset: assets/fonts/DejaVuSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DejaVuSans-BoldOblique.ttf
          weight: 700
          style: italic
    - family: DejaVu Sans Mono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
    - family: DejaVu Serif
      fonts:
        - asset: assets/fonts/DejaVuSerif.ttf
        - asset: assets/fonts/DejaVuSerif-Italic.ttf
          style: italic
        - asset: assets/fonts/DejaVuSerif-Bold.ttf
          weight: 700
        - asset: assets/fonts/DejaVuSerif-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Crimson Text
      fonts:
        - asset: assets/google_fonts/CrimsonText-Regular.ttf
        - asset: assets/google_fonts/CrimsonText-Italic.ttf
