name: fluent_editor
description: "A powerful and feature-rich rich word processor for Flutter applications with support for rich text editing, tables, images, lists, and export to DOCX, ODT, and PDF formats."
version: 1.0.3
homepage: https://github.com/exusr/fluent-editor

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.11.0
  desktop_drop: ^0.7.1
  file_picker: ^8.0.0
  file_selector: ^1.0.0
  pdf: ^3.11.0
  path_provider: ^2.1.0
  google_fonts: ^6.2.1
  archive: ^3.6.1
  nanoid: ^1.0.0
  json_serializable: ^6.7.1
  shared_preferences: ^2.3.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8

flutter:
  assets:
    - assets/fonts/
  # Bundled Noto fonts for PDF export (OFL license)
  # Used as fallback when google_fonts is unavailable offline
